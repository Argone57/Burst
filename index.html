<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Burst - Compteur de points</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --card:#1f2937;
      --border:#334155;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#22c55e;
      --danger:#ef4444;
      --neutral:#334155;
      --radius:16px;
      --tap:40px;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      background:linear-gradient(180deg,#07101c 0%, #0f172a 45%, #111827 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      overflow-x:hidden;
    }
    body{min-height:100dvh}
    .app{
      width:min(1200px,100%);
      margin:0 auto;
      padding:clamp(8px,1.5vw,16px);
      display:flex;
      flex-direction:column;
      gap:clamp(8px,1.2vw,14px);
    }
    .section{
      background:rgba(17,24,39,.95);
      border:1px solid rgba(51,65,85,.9);
      border-radius:var(--radius);
      padding:clamp(10px,1.4vw,16px);
      box-shadow:0 12px 30px rgba(0,0,0,.25);
    }
    h1,h2{margin:0 0 10px 0; line-height:1.15}
    h1{font-size:clamp(1.1rem,1rem + 1vw,1.55rem)}
    h2{font-size:clamp(1rem,.95rem + .75vw,1.25rem)}
    .hidden{display:none !important}
    .setup{display:grid; gap:12px}
    .setup-row{display:flex; flex-wrap:wrap; align-items:center; gap:10px}
    label{color:var(--muted); font-weight:600}
    input,select,button{font:inherit}
    .field,.round-input,.setup-row select,.setup-row input{
      min-height:var(--tap);
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--bg);
      color:var(--text);
      padding:10px 12px;
      outline:none;
    }
    .btn{
      min-height:var(--tap);
      border:none;
      border-radius:12px;
      padding:10px 14px;
      color:white;
      font-weight:800;
      cursor:pointer;
      touch-action:manipulation;
    }
    .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
    .btn-success{background:linear-gradient(135deg,#16a34a,#15803d)}
    .btn-danger{background:linear-gradient(135deg,#b91c1c,#991b1b)}
    .btn-neutral{background:#475569}
    .player-count-btns{
      display:flex;
      gap:8px;
    }
    .player-count-btn{
      min-width:48px;
      background:#334155;
      font-size:1.1rem;
    }
    .player-count-btn.active{
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
    }
    .player-name-inputs{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:10px;
    }
    .layout-play{display:grid; gap:12px}
    .top-area{
      display:grid;
      grid-template-columns:minmax(0,1.1fr) minmax(280px,.9fr);
      gap:12px;
      align-items:start;
    }
    .river-panel,.scores-panel,.winner-panel{
      background:rgba(15,23,42,.72);
      border:1px solid rgba(51,65,85,.95);
      border-radius:var(--radius);
      padding:12px;
    }
    .topbar{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(2,6,23,.35);
      border:1px solid rgba(51,65,85,.95);
      font-weight:800;
      cursor:pointer;
    }
    .pill:hover{background:rgba(51,65,85,.4)}
    .chrono-btn{
      min-width:90px;
      padding:10px 16px;
      border-radius:14px;
      background:rgba(2,6,23,.5);
      border:1px solid rgba(51,65,85,.95);
      color:#e5e7eb;
      font-size:1.05rem;
      font-weight:900;
      cursor:pointer;
      touch-action:manipulation;
      letter-spacing:.03em;
    }
    .chrono-btn.paused{
      color:#facc15;
      border-color:rgba(250,204,21,.4);
    }
    .total-box{
      min-width:110px;
      padding:10px 14px;
      border-radius:14px;
      background:linear-gradient(135deg,#1d4ed8,#0f766e);
      color:white;
      font-size:clamp(1.3rem,1rem + 1.2vw,1.9rem);
      font-weight:900;
      text-align:center;
    }
    .river-total-hot {
      color: #ef4444 !important;
      font-size: 3em;
      animation: riverShake 0.18s linear infinite;
    }
    @keyframes riverShake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-1px)}
      75%{transform:translateX(1px)}
    }
    .river{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      min-height:60px;
      max-height:clamp(110px,18vh,150px);
      overflow:auto;
      padding:8px;
      border-radius:14px;
      background:rgba(2,6,23,.35);
      border:1px dashed rgba(51,65,85,.9);
    }
    .river-card{
      min-width:46px;
      min-height:36px;
      display:grid;
      place-items:center;
      padding:0 10px;
      border-radius:10px;
      background:linear-gradient(180deg,#334155,#1f2937);
      border:1px solid rgba(148,163,184,.15);
      color:#fff;
      font-weight:800;
      cursor:pointer;
      touch-action:manipulation;
    }
    .controls{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(42px,1fr));
      gap:6px;
      margin-top:10px;
    }
    .value-btn{
      min-height:38px;
      border:none;
      border-radius:10px;
      background:#334155;
      color:#fff;
      font-weight:800;
      cursor:pointer;
      touch-action:manipulation;
    }
    .game-status{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(2,6,23,.35);
      color:#dbe4f0;
      line-height:1.35;
      flex:1;
      min-width:220px;
    }
    .players-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
    }
    .player-card{
      background:rgba(2,6,23,.24);
      border:1px solid rgba(51,65,85,.95);
      border-radius:14px;
      padding:8px 10px;
    }
    .player-name{
      font-size:.95rem;
      font-weight:900;
      flex:1;
      min-width:0;
      word-break:break-word;
    }
    .player-score{
      font-size:1.1rem;
      font-weight:900;
      color:#fff;
      white-space:nowrap;
      min-width:3ch;
      text-align:right;
    }
    .round-row{
      display:flex;
      align-items:center;
      gap:6px;
      width:100%;
    }
    .round-input{
      width:90px;
      min-width:0;
      text-align:center;
      font-weight:700;
      flex-shrink:0;
    }
    .small-btn{
      min-height:36px;
      min-width:36px;
      padding:0 10px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      color:#fff;
      font-weight:900;
      line-height:1;
      touch-action:manipulation;
    }
    .small-add{background:var(--accent)}
    .small-sub{background:var(--danger)}
    .leaderboard-section{
      background:rgba(15,23,42,.8);
      border:1px solid rgba(34,197,94,.3);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }
    .leaderboard-title{
      font-size:.95rem;
      font-weight:900;
      color:var(--accent);
      margin-bottom:6px;
      text-align:center;
    }
    .leaderboard-grid{
      display:grid;
      gap:3px;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    }
    .leaderboard-item{
      position:relative;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:5px 8px;
      background:rgba(15,23,42,.6);
      border:1px solid rgba(51,65,85,.5);
      border-radius:8px;
      font-size:.88rem;
      font-weight:700;
      overflow:hidden;
    }
    .leaderboard-progress{
      position:absolute;
      left:0; top:0; bottom:0;
      background:rgba(34,197,94,.25);
      border-radius:8px;
      transition:width .4s ease;
      pointer-events:none;
    }
    .leaderboard-rank,.leaderboard-name,.leaderboard-score{
      position:relative;
      z-index:1;
    }
    .leaderboard-rank{
      color:var(--accent);
      width:20px;
      text-align:center;
      font-weight:900;
      font-size:.9rem;
    }
    .leaderboard-name{
      flex:1;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      padding-left:4px;
    }
    .leaderboard-score{
      color:#fff;
      font-weight:900;
      min-width:42px;
      text-align:right;
      font-size:.9rem;
    }
    .winner-panel{display:grid; gap:10px}
    .winner-title{
      font-size:1.05rem;
      font-weight:900;
      color:#dcfce7;
    }
    .winner-actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }
    .known-trash-btn{
      min-height:32px;
      padding:4px 10px;
      font-size:1rem;
      background:transparent;
      border:1px solid rgba(51,65,85,.7);
      border-radius:8px;
      cursor:pointer;
      opacity:.6;
      transition:opacity .15s, border-color .15s;
    }
    .known-trash-btn.active{
      opacity:1;
      border-color:#ef4444;
      background:rgba(239,68,68,.12);
    }
    .known-chip.delete-mode{
      border-color:#ef4444;
      color:#fca5a5;
      cursor:pointer;
    }
    .known-chip.delete-mode:hover{
      background:rgba(239,68,68,.2);
    }
    .known-chip{
      padding:7px 14px;
      border-radius:999px;
      border:1px solid rgba(51,65,85,.9);
      background:rgba(2,6,23,.4);
      color:#e5e7eb;
      font-weight:700;
      cursor:pointer;
      font-size:.9rem;
      transition:opacity .15s, background .15s;
    }
    .known-chip.used{
      opacity:.4;
      background:rgba(51,65,85,.3);
    }
    @media (max-width:900px){
      .top-area{grid-template-columns:1fr}
    }
    @media (max-width:640px){
      .app{padding:8px; gap:8px}
      .section{padding:10px}
      .players-grid{grid-template-columns:1fr}
      .leaderboard-grid{grid-template-columns:1fr}
      .leaderboard-item{font-size:.85rem; padding:4px 6px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="section" id="setupSection">
      <h1>Burst - Compteur de points</h1>
      <div class="setup">
        <div class="setup-row">
          <label>Nombre de joueurs :</label>
          <div class="player-count-btns">
            <button class="btn player-count-btn" data-count="3" type="button">3</button>
            <button class="btn player-count-btn active" data-count="4" type="button">4</button>
            <button class="btn player-count-btn" data-count="5" type="button">5</button>
            <button class="btn player-count-btn" data-count="6" type="button">6</button>
          </div>
        </div>
        <div class="player-name-inputs" id="playerNameInputs"></div>
        <div class="setup-row">
          <button class="btn btn-success" id="startGameBtn">Démarrer la partie</button>
        </div>
        <div id="knownPlayersBlock" class="hidden">
          <div style="display:flex; align-items:center; gap:10px;">
            <label>Joueurs connus :</label>
            <button class="btn known-trash-btn" id="trashModeBtn" type="button" title="Supprimer un joueur">🗑️</button>
            <button class="btn known-trash-btn" id="sortModeBtn" type="button" title="Trier par utilisation récente">🔤</button>
          </div>
          <div id="knownPlayersList" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;"></div>
        </div>
      </div>
    </div>

    <div class="layout-play hidden" id="gameView">
      <div class="top-area">
        <div class="river-panel">
          <div class="topbar">
            <div class="pill" id="roundPill">Manche <span id="roundNumber">1</span></div>
            <button class="chrono-btn" id="chronoBtn" type="button">0 min</button>
            <div class="total-box" id="riverTotal">0</div>
          </div>
          <div class="river" id="river"></div>
          <div class="controls" id="valueButtons"></div>
        </div>

        <div class="winner-panel hidden" id="winnerPanel">
          <div class="winner-title" id="winnerText"></div>
          <div class="winner-actions">
            <button class="btn btn-success" id="restartSameBtn">Recommencer avec les mêmes joueurs</button>
            <button class="btn btn-neutral" id="backHomeBtn">Revenir à l'accueil</button>
            <button class="btn btn-danger" id="cancelRoundBtn">Annuler dernière manche</button>
          </div>
        </div>
      </div>

      <div class="scores-panel">
        <div class="scores-header">
          <h2>Scores des joueurs</h2>
          <div class="game-status" id="gameStatus">La partie est en cours.</div>
        </div>

        <div id="leaderboardSection" class="leaderboard-section">
          <div class="leaderboard-title" id="leaderboardTitle" style="cursor:pointer;" title="Changer le tri">🏆 Classement actuel</div>
          <div class="leaderboard-grid" id="leaderboardList"></div>
        </div>

        <div class="players-grid" id="playersGrid"></div>

        <div style="text-align:center; margin-top:16px">
          <button class="btn btn-primary" id="nextRoundBtnBottom">Manche suivante</button>
          <button class="btn btn-danger" id="cancelRoundBtnBottom">Annuler dernière manche</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let selectedPlayerCount = 4;
    const createPlayersBtn = null; // replaced by auto-render on click
    const startGameBtn = document.getElementById('startGameBtn');
    const playerNameInputs = document.getElementById('playerNameInputs');
    const setupSection = document.getElementById('setupSection');
    const gameView = document.getElementById('gameView');
    const river = document.getElementById('river');
    const riverTotal = document.getElementById('riverTotal');
    const valueButtons = document.getElementById('valueButtons');
    const playersGrid = document.getElementById('playersGrid');
    const gameStatus = document.getElementById('gameStatus');
    const winnerPanel = document.getElementById('winnerPanel');
    const winnerText = document.getElementById('winnerText');
    const restartSameBtn = document.getElementById('restartSameBtn');
    const backHomeBtn = document.getElementById('backHomeBtn');
    const cancelRoundBtn = document.getElementById('cancelRoundBtn');
    const roundPill = document.getElementById('roundPill');
    const roundNumber = document.getElementById('roundNumber');
    const leaderboardSection = document.getElementById('leaderboardSection');
    const leaderboardList = document.getElementById('leaderboardList');
    const nextRoundBtnBottom = document.getElementById('nextRoundBtnBottom');
    const cancelRoundBtnBottom = document.getElementById('cancelRoundBtnBottom');

    const CARD_DEFS = [
      { value: -3, color: '#1a4a8a', textDark: false, max: 2 },
      { value: -2, color: '#2e6bbf', textDark: false, max: 3 },
      { value: -1, color: '#6aaee8', textDark: false, max: 5 },
      { value:  0, color: '#f0f0f0', textDark: true,  max: 9 },
      { value:  1, color: '#f5e84a', textDark: true,  max: 8 },
      { value:  2, color: '#f0d030', textDark: true,  max: 8 },
      { value:  3, color: '#e8b820', textDark: true,  max: 7 },
      { value:  4, color: '#e8a020', textDark: true,  max: 7 },
      { value:  5, color: '#e88020', textDark: false, max: 6 },
      { value:  6, color: '#e06020', textDark: false, max: 6 },
      { value:  7, color: '#d84020', textDark: false, max: 5 },
      { value:  8, color: '#cc2c18', textDark: false, max: 5 },
      { value:  9, color: '#c01810', textDark: false, max: 4 },
      { value: 10, color: '#b01010', textDark: false, max: 4 },
      { value: 11, color: '#a00808', textDark: false, max: 3 },
      { value: 12, color: '#8c0404', textDark: false, max: 3 },
      { value: 13, color: '#780202', textDark: false, max: 2 },
      { value: 14, color: '#640000', textDark: false, max: 2 },
      { value: 15, color: '#4a0000', textDark: false, max: 1 },
    ];
    const values = CARD_DEFS.map(c => c.value);

    let players = [];
    let riverCards = [];
    let playedCards = []; // toutes les cartes jouées dans la manche (même retirées de la rivière)
    let gameOver = false;
    let round = 1;
    let roundPending = []; // points saisis pour la manche en cours (non encore validés dans le classement)
    let knownPlayers = JSON.parse(localStorage.getItem('burst_known_players') || '[]');
    let knownPlayersUsage = JSON.parse(localStorage.getItem('burst_known_usage') || '{}');
    let trashMode = false;
    let sortByRecent = false;
    let leaderboardSortAlpha = false;
    let lastRoundScores = []; // snapshot des scores avant la dernière manche (pour annulation)
    const PLAYER_COLORS = ["#60a5fa", "#f472b6", "#facc15", "#ffffff", "#fb923c", "#a78bfa"];

    // Chrono
    let chronoSeconds = 0;
    let chronoPaused = false;
    let chronoInterval = null;
    const chronoBtn = document.getElementById('chronoBtn');

    function formatChrono(s) {
      const mins = Math.round(s / 60);
      return mins + ' min';
    }

    function updateChronoDisplay() {
      if (chronoPaused) {
        chronoBtn.textContent = '⏸ ' + formatChrono(chronoSeconds);
        chronoBtn.classList.add('paused');
      } else {
        chronoBtn.textContent = formatChrono(chronoSeconds);
        chronoBtn.classList.remove('paused');
      }
    }

    function startChrono() {
      chronoSeconds = 0;
      chronoPaused = false;
      clearInterval(chronoInterval);
      updateChronoDisplay();
      chronoInterval = setInterval(() => {
        if (!chronoPaused) {
          chronoSeconds++;
          updateChronoDisplay();
        }
      }, 1000);
    }

    function stopChrono() {
      clearInterval(chronoInterval);
      chronoInterval = null;
    }

    chronoBtn.addEventListener('click', () => {
      if (!chronoInterval && !chronoPaused) return; // not started
      chronoPaused = !chronoPaused;
      updateChronoDisplay();
    });

    function renderPlayerInputs() {
      const count = selectedPlayerCount;
      // Sauvegarder les noms déjà saisis avant de reconstruire
      const previousNames = [];
      for (let i = 0; ; i++) {
        const input = document.getElementById(`playerName${i}`);
        if (!input) break;
        previousNames.push(input.value);
      }
      playerNameInputs.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Joueur ${i + 1}`;
        // Garder le nom précédent s'il existe (sauf si c'était un placeholder par défaut)
        const prev = previousNames[i];
        input.value = (prev !== undefined && !/^Joueur \d+$/.test(prev)) ? prev : '';
        input.id = `playerName${i}`;
        input.addEventListener('focus', () => input.select());
        input.addEventListener('input', () => {
          if (input.value.trim()) {
            input.style.borderColor = '';
            input.style.boxShadow = '';
            input.placeholder = `Joueur ${i + 1}`;
          }
        });
        playerNameInputs.appendChild(input);
      }
      renderKnownPlayers();
    }

    function getUsedNames() {
      const count = selectedPlayerCount;
      const used = [];
      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`playerName${i}`);
        if (input && input.value.trim()) used.push(input.value.trim());
      }
      return used;
    }

    function renderKnownPlayers() {
      const block = document.getElementById('knownPlayersBlock');
      const list = document.getElementById('knownPlayersList');
      const trashBtn = document.getElementById('trashModeBtn');
      const sortBtn = document.getElementById('sortModeBtn');
      if (!knownPlayers.length) {
        block.classList.add('hidden');
        trashMode = false;
        return;
      }
      block.classList.remove('hidden');
      if (trashBtn) trashBtn.classList.toggle('active', trashMode);
      if (sortBtn) {
        sortBtn.classList.toggle('active', sortByRecent);
        sortBtn.textContent = sortByRecent ? '🕐' : '🔤';
        sortBtn.title = sortByRecent ? 'Trier alphabétiquement' : 'Trier par utilisation récente';
      }
      // Trier la liste
      const sorted = [...knownPlayers].sort((a, b) => {
        if (sortByRecent) {
          return (knownPlayersUsage[b] || 0) - (knownPlayersUsage[a] || 0);
        }
        return a.localeCompare(b, 'fr', { sensitivity: 'base' });
      });
      list.innerHTML = '';
      const usedNames = getUsedNames();
      sorted.forEach(name => {
        const chip = document.createElement('button');
        chip.type = 'button';
        if (trashMode) {
          chip.className = 'known-chip delete-mode';
          chip.textContent = '✕ ' + name;
          chip.addEventListener('click', () => {
            knownPlayers = knownPlayers.filter(n => n !== name);
            localStorage.setItem('burst_known_players', JSON.stringify(knownPlayers));
            // Remettre le champ par défaut si ce nom était utilisé
            const count = selectedPlayerCount;
            for (let i = 0; i < count; i++) {
              const input = document.getElementById(`playerName${i}`);
              if (input && input.value === name) input.value = '';
            }
            if (!knownPlayers.length) trashMode = false;
            renderKnownPlayers();
          });
        } else {
          chip.className = 'known-chip' + (usedNames.includes(name) ? ' used' : '');
          chip.textContent = name;
          chip.addEventListener('click', () => {
            const count = selectedPlayerCount;
            const usedNow = getUsedNames();
            if (usedNow.includes(name)) {
              for (let i = 0; i < count; i++) {
                const input = document.getElementById(`playerName${i}`);
                if (input && input.value === name) {
                  input.value = '';
                  break;
                }
              }
            } else {
              for (let i = 0; i < count; i++) {
                const input = document.getElementById(`playerName${i}`);
                if (input && input.value.trim() === '') {
                  input.value = name;
                  break;
                }
              }
            }
            renderKnownPlayers();
          });
        }
        list.appendChild(chip);
      });
    }

    // Wiring trash button (after DOM ready)
    document.getElementById('trashModeBtn').addEventListener('click', () => {
      trashMode = !trashMode;
      renderKnownPlayers();
    });

    document.getElementById('sortModeBtn').addEventListener('click', () => {
      sortByRecent = !sortByRecent;
      renderKnownPlayers();
    });

    document.getElementById('leaderboardTitle').addEventListener('click', () => {
      leaderboardSortAlpha = !leaderboardSortAlpha;
      updateLeaderboard();
    });

    function renderValueButtons() {
      valueButtons.innerHTML = '';
      CARD_DEFS.forEach(def => {
        const used = riverCards.filter(c => c === def.value).length;
        const exhausted = used >= def.max;
        const btn = document.createElement('button');
        btn.className = 'value-btn';
        btn.dataset.value = def.value;
        btn.type = 'button';
        if (exhausted) {
          btn.style.background = def.color;
          btn.style.color = def.textDark ? 'rgba(0,0,0,0.35)' : 'rgba(255,255,255,0.35)';
          btn.style.opacity = '0.4';
          btn.style.textDecoration = 'line-through';
          btn.style.cursor = 'not-allowed';
        } else {
          btn.style.background = def.color;
          btn.style.color = def.textDark ? '#1a1200' : '#fff';
          btn.style.opacity = '1';
          btn.style.textDecoration = 'none';
          btn.style.cursor = 'pointer';
        }
        btn.title = `${def.value} (${used}/${def.max})`;
        btn.textContent = def.value;
        btn.onclick = () => { if (!exhausted) addCardToRiver(def.value); };
        valueButtons.appendChild(btn);
      });
    }

    function updateRiver() {
      river.innerHTML = '';
      riverCards.forEach((card, index) => {
        const def = CARD_DEFS.find(d => d.value === card);
        const el = document.createElement('button');
        el.className = 'river-card';
        el.type = 'button';
        el.textContent = card;
        if (def) {
          el.style.background = def.color;
          el.style.color = def.textDark ? '#1a1200' : '#fff';
          el.style.borderColor = 'rgba(255,255,255,.15)';
        }
        el.onclick = () => {
          if (gameOver) return;
          riverCards.splice(index, 1);
          updateRiver();
        };
        river.appendChild(el);
      });
      const total = riverCards.reduce((a, b) => a + b, 0);
      riverTotal.textContent = total;
      riverTotal.classList.toggle('river-total-hot', total > 21);
      renderValueButtons();
    }

    function addCardToRiver(value) {
      if (gameOver) return;
      riverCards.push(value);
      playedCards.push(value);
      updateRiver();
      renderValueButtons();
    }

    function renderPlayers() {
      playersGrid.innerHTML = '';
      players.forEach((player, index) => {
        const color = PLAYER_COLORS[index % PLAYER_COLORS.length];
        const card = document.createElement('div');
        card.className = 'player-card';
        card.innerHTML = `
          <div class="round-row">
            <div class="player-name" style="color:${color}" title="${player.name}">${player.name}</div>
            <input class="round-input" type="number" step="1" id="round-${index}" placeholder="Points">
            <button class="small-btn small-add" type="button" onclick="addRoundPoints(${index})">+</button>
            <button class="small-btn small-sub" type="button" onclick="subtractRoundPoints(${index})">-</button>
            <div class="player-score" id="score-${index}">${player.score}</div>
          </div>
        `;
        playersGrid.appendChild(card);
        const input = card.querySelector(`#round-${index}`);
        // Mise à jour du score affiché en temps réel sans toucher au classement
        input.addEventListener('input', () => {
          const val = parseInt(input.value, 10);
          const el = document.getElementById(`score-${index}`);
          if (!el) return;
          // Le score de base = score actuel moins le pending déjà appliqué
          const baseScore = players[index].score - (roundPending[index] !== undefined ? roundPending[index] : 0);
          if (Number.isNaN(val)) {
            el.textContent = players[index].score;
          } else {
            el.textContent = baseScore + val;
          }
        });
        input.addEventListener('keydown', (e) => {
          if (e.key !== 'Enter') return;
          e.preventDefault();
          applyRoundPoints(index);
          const nextInput = document.getElementById(`round-${index + 1}`);
          if (nextInput) {
            nextInput.focus();
            nextInput.select();
          }
        });
      });
    }

    function updateLeaderboard() {
      // Rangs calculés toujours par score
      const rankedByScore = [...players].sort((a, b) => b.score - a.score);
      const rankMap = {};
      rankedByScore.forEach((p, i) => { rankMap[p.name] = i + 1; });
      // Ordre d'affichage selon le tri choisi
      const sortedPlayers = [...players].sort((a, b) =>
        leaderboardSortAlpha
          ? a.name.localeCompare(b.name, 'fr', { sensitivity: 'base' })
          : b.score - a.score
      );
      const titleEl = document.getElementById('leaderboardTitle');
      if (titleEl) titleEl.textContent = leaderboardSortAlpha ? '🔤 Classement actuel' : '🏆 Classement actuel';
      leaderboardList.innerHTML = '';
      sortedPlayers.forEach((player) => {
        const item = document.createElement('div');
        item.className = 'leaderboard-item';
        const pct = Math.min(Math.max(player.score, 0), 100);
        const playerColor = PLAYER_COLORS[players.indexOf(player) % PLAYER_COLORS.length];
        item.innerHTML = `
          <div class="leaderboard-progress" style="width:${pct}%"></div>
          <span class="leaderboard-rank">${rankMap[player.name]}.</span>
          <span class="leaderboard-name" style="color:${playerColor}">${player.name}</span>
          <span class="leaderboard-score">${player.score}</span>
        `;
        leaderboardList.appendChild(item);
      });
    }

    function updateScores() {
      players.forEach((p, i) => {
        const el = document.getElementById(`score-${i}`);
        if (el) el.textContent = p.score;
      });
    }

    function updateScoresAndLeaderboard() {
      updateScores();
      updateLeaderboard();
    }

    function getRoundValue(index) {
      const input = document.getElementById(`round-${index}`);
      const value = parseInt(input.value, 10);
      if (Number.isNaN(value)) return null;
      input.value = '';
      return value;
    }

    function checkWinnerAtEndOfRound() {
      const eligible = players.filter(p => p.score >= 100);
      if (!eligible.length) return false;
      const topScore = Math.max(...players.map(p => p.score));
      const winners = players.filter(p => p.score === topScore);
      gameOver = true;
      stopChrono();
      // Désactiver les champs de saisie
      players.forEach((_, i) => {
        const inp = document.getElementById(`round-${i}`);
        const ab = document.querySelector(`button[onclick="addRoundPoints(${i})"]`);
        const sb = document.querySelector(`button[onclick="subtractRoundPoints(${i})"]`);
        if (inp) { inp.disabled = true; inp.style.opacity = '0.4'; }
        if (ab) { ab.disabled = true; ab.style.opacity = '0.4'; }
        if (sb) { sb.disabled = true; sb.style.opacity = '0.4'; }
      });
      // Sauvegarder les noms des joueurs
      const now = Date.now();
      players.forEach(p => {
        if (!knownPlayers.includes(p.name)) knownPlayers.push(p.name);
        knownPlayersUsage[p.name] = now;
      });
      localStorage.setItem('burst_known_players', JSON.stringify(knownPlayers));
      localStorage.setItem('burst_known_usage', JSON.stringify(knownPlayersUsage));
      winnerPanel.classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      nextRoundBtnBottom.classList.add('hidden');
      if (winners.length === 1) {
        winnerText.textContent = `Partie terminée. Gagnant : ${winners[0].name} avec ${topScore} points.`;
      } else {
        const names = winners.map(w => w.name).join(', ');
        winnerText.textContent = `Partie terminée. Égalité ! Gagnants : ${names} avec ${topScore} points.`;
      }
      gameStatus.textContent = 'La partie est terminée.';
      return true;
    }

    function nextRound() {
      if (gameOver) return;
      // Snapshot des scores AVANT la manche (pour pouvoir annuler)
      // On reconstitue les scores de base en retirant les pending déjà appliqués
      const baseScores = players.map((p, i) =>
        p.score - (roundPending[i] !== undefined ? roundPending[i] : 0)
      );
      lastRoundScores = baseScores;
      // Appliquer les scores de base propres
      players.forEach((p, i) => { p.score = baseScores[i]; });
      // Appliquer les valeurs finales : champ en cours prioritaire, sinon pending
      players.forEach((_, i) => {
        const input = document.getElementById(`round-${i}`);
        const inputVal = input ? parseInt(input.value, 10) : NaN;
        const val = !Number.isNaN(inputVal) ? inputVal : (roundPending[i] !== undefined ? roundPending[i] : undefined);
        if (val !== undefined) {
          players[i].score += val;
          if (input) input.value = '';
        }
      });
      roundPending = [];
      updateScoresAndLeaderboard();
      if (checkWinnerAtEndOfRound()) return;
      round += 1;
      roundNumber.textContent = round;
      gameStatus.textContent = `Manche ${round - 1} terminée. Manche ${round} en cours.`;
      riverCards = [];
      playedCards = [];
      updateRiver();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Applique les points d'un joueur pour la manche en cours (remplace si déjà saisi)
    window.applyRoundPoints = function(index) {
      if (gameOver) return;
      const input = document.getElementById(`round-${index}`);
      const value = parseInt(input.value, 10);
      if (Number.isNaN(value)) return;
      input.value = '';
      // Annuler le pending précédent s'il existe
      if (roundPending[index] !== undefined) {
        players[index].score -= roundPending[index];
      }
      roundPending[index] = value;
      players[index].score += value;
      updateScores(); // met à jour l'affichage du score dans la carte, pas le classement
    };

    window.addRoundPoints = function(index) {
      applyRoundPoints(index);
    };

    window.subtractRoundPoints = function(index) {
      if (gameOver) return;
      const input = document.getElementById(`round-${index}`);
      const value = parseInt(input.value, 10);
      if (Number.isNaN(value)) return;
      input.value = '';
      if (roundPending[index] !== undefined) {
        players[index].score -= roundPending[index];
      }
      roundPending[index] = -value;
      players[index].score -= value;
      updateScores();
    };

    function startFromSetup() {
      const count = selectedPlayerCount;
      players = [];
      let hasEmpty = false;
      for (let i = 0; i < count; i++) {
        const input = document.getElementById(`playerName${i}`);
        if (!input || !input.value.trim()) {
          hasEmpty = true;
          if (input) {
            input.style.borderColor = '#ef4444';
            input.style.boxShadow = '0 0 0 2px rgba(239,68,68,.3)';
            input.placeholder = 'Nom requis !';
          }
        } else {
          if (input) {
            input.style.borderColor = '';
            input.style.boxShadow = '';
          }
          players.push({ name: input.value.trim(), score: 0 });
        }
      }
      if (hasEmpty) return;
      riverCards = [];
      playedCards = [];
      roundPending = [];
      gameOver = false;
      round = 1;
      roundNumber.textContent = round;

      setupSection.classList.add('hidden');
      gameView.classList.remove('hidden');
      winnerPanel.classList.add('hidden');
      nextRoundBtnBottom.classList.remove('hidden');
      gameStatus.textContent = 'La partie est en cours.';
      startChrono();
      renderValueButtons();
      updateRiver();
      renderPlayers();
      updateScoresAndLeaderboard();
    }

    function restartSamePlayers() {
      players = players.map(p => ({ name: p.name, score: 0 }));
      riverCards = [];
      playedCards = [];
      gameOver = false;
      round = 1;
      roundNumber.textContent = round;
      roundPending = [];
      winnerPanel.classList.add('hidden');
      nextRoundBtnBottom.classList.remove('hidden');
      gameStatus.textContent = 'La partie est relancée avec les mêmes joueurs.';
      updateRiver();
      renderPlayers();
      updateScoresAndLeaderboard();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backHome() {
      players = [];
      riverCards = [];
      gameOver = false;
      round = 1;
      roundNumber.textContent = round;
      roundPending = [];
      playedCards = [];
      winnerPanel.classList.add('hidden');
      gameView.classList.add('hidden');
      setupSection.classList.remove('hidden');
      updateLeaderboard();
      updateRiver();
      renderPlayerInputs();
      playerNameInputs.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    document.querySelectorAll('.player-count-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedPlayerCount = parseInt(btn.dataset.count, 10);
        document.querySelectorAll('.player-count-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPlayerInputs();
      });
    });
    startGameBtn.onclick = startFromSetup;
    restartSameBtn.onclick = restartSamePlayers;
    backHomeBtn.onclick = backHome;
    function cancelLastRound() {
      if (!lastRoundScores.length) return;
      players.forEach((p, i) => { p.score = lastRoundScores[i]; });
      lastRoundScores = [];
      roundPending = [];
      if (gameOver) {
        gameOver = false;
        startChrono();
        winnerPanel.classList.add('hidden');
      }
      // Reculer d'une manche
      if (round > 1) {
        round -= 1;
        roundNumber.textContent = round;
      }
      nextRoundBtnBottom.classList.remove('hidden');
      // Réactiver les champs de saisie si on revenait d'un game over
      players.forEach((_, i) => {
        const inp = document.getElementById(`round-${i}`);
        const ab = document.querySelector(`button[onclick="addRoundPoints(${i})"]`);
        const sb = document.querySelector(`button[onclick="subtractRoundPoints(${i})"]`);
        if (inp) { inp.disabled = false; inp.style.opacity = ''; }
        if (ab) { ab.disabled = false; ab.style.opacity = ''; }
        if (sb) { sb.disabled = false; sb.style.opacity = ''; }
      });
      gameStatus.textContent = `Manche ${round} en cours.`;
      updateScoresAndLeaderboard();
      renderPlayers();
    }
    cancelRoundBtn.onclick = cancelLastRound;
    cancelRoundBtnBottom.onclick = cancelLastRound;
    roundPill.onclick = nextRound;
    nextRoundBtnBottom.onclick = nextRound;

    renderPlayerInputs();
    renderValueButtons();
    updateRiver();
  </script>
</body>
</html>
